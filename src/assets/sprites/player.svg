<!--
  player.svg — pixel-art placeholder sprite (32×40 px grid, displayed at 96×120)
  Replace with final artwork when available.
  Colour palette:
    skin   #f0c8a0  face/hands
    hair   #4a2a10  dark brown
    shirt  #3050a0  school uniform (blue)
    collar #f0f0f0  white collar
    pants  #2a3a70  dark trousers
    shoes  #1a1a1a
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 40"
     width="96" height="120"
     shape-rendering="crispEdges"
     role="img"
     aria-label="プレイヤー">

  <!-- ── hair ── -->
  <rect x="9"  y="0"  width="14" height="5"  fill="#4a2a10"/>
  <!-- fringe -->
  <rect x="9"  y="4"  width="3"  height="2"  fill="#4a2a10"/>
  <rect x="20" y="4"  width="3"  height="2"  fill="#4a2a10"/>

  <!-- ── head ── -->
  <rect x="10" y="3"  width="12" height="10" fill="#f0c8a0"/>

  <!-- eyes -->
  <rect x="12" y="6"  width="3"  height="2"  fill="#2a1a10"/>
  <rect x="17" y="6"  width="3"  height="2"  fill="#2a1a10"/>
  <!-- eye shine -->
  <rect x="14" y="6"  width="1"  height="1"  fill="#ffffff"/>
  <rect x="19" y="6"  width="1"  height="1"  fill="#ffffff"/>

  <!-- smile -->
  <rect x="13" y="10" width="6"  height="1"  fill="#c07050"/>
  <rect x="12" y="11" width="1"  height="1"  fill="#c07050"/>
  <rect x="19" y="11" width="1"  height="1"  fill="#c07050"/>

  <!-- ── neck ── -->
  <rect x="13" y="13" width="6"  height="2"  fill="#f0c8a0"/>

  <!-- ── torso (school uniform) ── -->
  <rect x="9"  y="15" width="14" height="9"  fill="#3050a0"/>
  <!-- white collar -->
  <rect x="13" y="15" width="2"  height="4"  fill="#f0f0f0"/>
  <rect x="17" y="15" width="2"  height="4"  fill="#f0f0f0"/>
  <!-- buttons -->
  <rect x="15" y="16" width="2"  height="1"  fill="#e0e0e0"/>
  <rect x="15" y="18" width="2"  height="1"  fill="#e0e0e0"/>
  <rect x="15" y="20" width="2"  height="1"  fill="#e0e0e0"/>

  <!-- ── arms ── -->
  <!-- left arm (sleeve) -->
  <rect x="4"  y="15" width="5"  height="4"  fill="#3050a0"/>
  <!-- left hand -->
  <rect x="3"  y="19" width="4"  height="4"  fill="#f0c8a0"/>
  <!-- right arm (sleeve) -->
  <rect x="23" y="15" width="5"  height="4"  fill="#3050a0"/>
  <!-- right hand -->
  <rect x="25" y="19" width="4"  height="4"  fill="#f0c8a0"/>

  <!-- ── legs ── -->
  <rect x="9"  y="24" width="6"  height="10" fill="#2a3a70"/>
  <rect x="17" y="24" width="6"  height="10" fill="#2a3a70"/>
  <!-- knee highlight -->
  <rect x="10" y="27" width="2"  height="1"  fill="#3a4a80"/>
  <rect x="18" y="27" width="2"  height="1"  fill="#3a4a80"/>

  <!-- ── shoes ── -->
  <rect x="8"  y="33" width="7"  height="3"  fill="#1a1a1a"/>
  <rect x="17" y="33" width="7"  height="3"  fill="#1a1a1a"/>
  <!-- toe detail -->
  <rect x="8"  y="35" width="3"  height="2"  fill="#1a1a1a"/>
  <rect x="17" y="35" width="3"  height="2"  fill="#1a1a1a"/>

</svg>
